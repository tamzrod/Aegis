# test/test.yaml
#
# Minimal but complete Aegis configuration used by the integration test.
# All fields required for a valid startup configuration are present.

server:
  listeners:
    - id: "primary"
      listen: ":502"
      memory:
        # Data memory — holds replicated device registers.
        - unit_id: 1
          holding_registers:
            start: 0
            count: 100
          input_registers:
            start: 0
            count: 50

        # Status memory — holds the device status block (30 registers, block index 0).
        - unit_id: 255
          holding_registers:
            start: 0
            count: 30

replicator:
  units:
    - id: "plc1"
      source:
        endpoint: "192.168.1.100:502"
        unit_id: 1
        timeout_ms: 1000
        status_slot: 0        # block index 0 → base register 0 in status memory
        device_name: "PLC1"

      reads:
        - fc: 3               # Read Holding Registers
          address: 0
          quantity: 10
          interval_ms: 1000

      target:
        listener_id: "primary"
        unit_id: 1
        status_unit_id: 255
        mode: "B"
