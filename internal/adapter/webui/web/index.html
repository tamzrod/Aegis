<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aegis</title>
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="global-header">
    <span class="global-header__title"><img src="/favicon/favicon.svg" alt="Aegis" class="header-logo">AEGIS CONTROL</span>
    <div class="global-header__actions">
      <a href="/help" class="btn-action">Help</a>
    </div>
    <div class="user-menu" id="user-menu">
      <button class="user-menu__trigger" id="user-menu-trigger"><span id="user-menu-name">User</span> ▾</button>
      <div class="user-menu__dropdown" id="user-menu-dropdown">
        <button class="user-menu__item" id="user-menu-settings">Settings</button>
        <button class="user-menu__item" id="user-menu-logout">Logout</button>
      </div>
    </div>
  </header>

  <div class="layout">

    <div class="left-panel">
      <div class="panel-title">Devices</div>
      <ul id="device-list" class="device-list"></ul>
      <div class="panel-actions">
        <button id="btn-add" class="btn-action">+ Add</button>
        <button id="btn-delete" class="btn-action">Delete</button>
      </div>
    </div>

    <div class="right-panel">

      <div class="runtime-controls">
        <div class="section-title">System Controls</div>
        <div class="section-divider"></div>
        <div class="runtime-controls__buttons">
          <div class="btn-group">
            <button id="btn-apply-config" class="btn-primary">Apply Config</button>
            <button id="btn-restart-runtime" class="btn-action">Restart Runtime</button>
          </div>
          <div class="btn-group-sep"></div>
          <div class="btn-group">
            <button id="btn-export-config" class="btn-action">Export Config</button>
            <input type="file" id="input-import-file" accept=".yaml,.yml" style="display:none">
            <button id="btn-import-config" class="btn-action">Import Config</button>
          </div>
        </div>
      </div>

      <div class="main-layout">

        <div class="config-panel">
          <div class="workspace-content">

            <div class="workspace-section">
              <div class="section-title-row">
                <span class="section-title">Source</span>
                <div id="src-actions" class="section-actions"></div>
              </div>
              <div class="section-divider"></div>
              <div id="source-content" class="section-body"></div>
            </div>

            <div class="workspace-section">
              <div class="section-title-row">
                <span class="section-title">Reads</span>
                <div id="reads-actions" class="section-actions"></div>
              </div>
              <div class="section-divider"></div>
              <div id="reads-content" class="section-body"></div>
            </div>

            <div class="workspace-section">
              <div class="section-title-row">
                <span class="section-title">Target</span>
                <div id="tgt-actions" class="section-actions"></div>
              </div>
              <div class="section-divider"></div>
              <div id="target-content" class="section-body"></div>
            </div>

          </div>
        </div>

        <div class="device-panel">
          <div class="workspace-section" id="device-status-section" style="display:none">
            <div class="section-title-row">
              <span class="section-title">Device Status</span>
            </div>
            <div class="section-divider"></div>
            <div id="device-status-content" class="section-body"></div>
          </div>
        </div>

      </div>

    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
