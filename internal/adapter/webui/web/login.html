<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Login</title>
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="160" height="160" role="img" aria-label="Aegis">
                    <defs>
                        <radialGradient id="g2" cx="40%" cy="35%" r="65%">
                            <stop offset="0%" stop-color="#1e4080"/>
                            <stop offset="100%" stop-color="#080820"/>
                        </radialGradient>
                    </defs>
                    <circle cx="100" cy="90" r="85" fill="url(#g2)"/>
                    <line x1="8" y1="90" x2="40" y2="90" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
                    <line x1="40" y1="90" x2="60" y2="55" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
                    <line x1="192" y1="90" x2="160" y2="90" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
                    <line x1="160" y1="90" x2="140" y2="55" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
                    <line x1="100" y1="5" x2="100" y2="38" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
                    <text x="100" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" letter-spacing="5" fill="#a0c4ff">AEGIS</text>
                    <text x="100" y="194" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF" letter-spacing="0.5">Secure Modbus Fan-out</text>
                </svg>
            </div>
            <div class="login-field">
                <label for="username">Username</label>
                <input class="field-input" type="text" id="username" name="username" autocomplete="username" autofocus>
            </div>
            <div class="login-field">
                <label for="password">Password</label>
                <input class="field-input" type="password" id="password" name="password" autocomplete="current-password">
            </div>
            <button class="btn-primary login-btn" id="loginBtn">Login</button>
            <div class="login-error" id="loginError">Invalid username or password.</div>
        </div>
    </div>
    <script>
        document.getElementById('loginBtn').addEventListener('click', doLogin);
        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        async function doLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                if (resp.ok) {
                    const body = await resp.json().catch(() => ({}));
                    sessionStorage.setItem('aegis_username', username);
                    if (body.password_change_required) {
                        window.location.href = '/change-password';
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    errEl.style.display = 'block';
                }
            } catch {
                errEl.style.display = 'block';
            }
        }
    </script>
</body>
</html>
