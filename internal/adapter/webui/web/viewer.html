<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aegis — Data Viewer</title>
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ---- Viewer page layout ---- */
    body.viewer-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .viewer-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1rem;
      gap: 1rem;
    }

    /* ---- Query controls bar ---- */
    .viewer-controls {
      background: #0f1220;
      border: 1px solid #2a2f45;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .viewer-controls__group {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .viewer-controls__label {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .viewer-controls__input {
      background: #1a1a3a;
      border: 1px solid #4a4a7a;
      border-radius: 3px;
      color: #e0e0e0;
      padding: 0.3rem 0.5rem;
      font-size: 0.875rem;
      min-width: 0;
    }

    .viewer-controls__input:focus {
      outline: none;
      border-color: #4a9eff;
    }

    select.viewer-controls__input {
      cursor: pointer;
      height: 36px;
      border-radius: 6px;
      padding: 4px 8px;
    }

    .viewer-controls__input--short {
      width: 90px;
    }

    .viewer-controls__input--medium {
      width: 160px;
    }

    .viewer-controls__input--fc {
      min-width: 220px;
      white-space: nowrap;
    }

    .viewer-controls__sep {
      width: 1px;
      height: 2rem;
      background: #2a2f45;
      align-self: flex-end;
    }

    .viewer-controls__actions {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
    }

    .viewer-controls__refresh {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: #aaa;
      cursor: pointer;
      user-select: none;
      align-self: flex-end;
      padding-bottom: 0.35rem;
    }

    .viewer-controls__refresh input[type="checkbox"] {
      accent-color: #4a9eff;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    /* ---- Endpoint info bar ---- */
    .viewer-endpoint {
      font-size: 0.8rem;
      color: #888;
      align-self: flex-end;
      padding-bottom: 0.35rem;
    }

    .viewer-endpoint span {
      color: #a0c4ff;
    }

    /* ---- Register table card ---- */
    .viewer-card {
      background: #0f1220;
      border: 1px solid #2a2f45;
      border-radius: 6px;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .viewer-card__header {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #2a2f45;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .viewer-card__title {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #8aa0ff;
    }

    .viewer-card__meta {
      font-size: 0.75rem;
      color: #666;
    }

    .viewer-card__body {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #3d3d6e #0d0d1a;
    }

    .viewer-card__body::-webkit-scrollbar {
      width: 6px;
    }

    .viewer-card__body::-webkit-scrollbar-track {
      background: #0d0d1a;
    }

    .viewer-card__body::-webkit-scrollbar-thumb {
      background-color: #3d3d6e;
      border-radius: 3px;
    }

    /* ---- Register table ---- */
    .reg-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.875rem;
    }

    .reg-table thead {
      position: sticky;
      top: 0;
      background: #0d0d1a;
      z-index: 1;
    }

    .reg-table th {
      padding: 0.5rem 0.75rem;
      text-align: left;
      color: #666;
      font-weight: 500;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #2a2f45;
      white-space: nowrap;
    }

    .reg-table tbody tr {
      cursor: pointer;
      border-bottom: 1px solid #1a1e30;
      transition: background 0.08s;
    }

    .reg-table tbody tr:hover {
      background: #151a2e;
    }

    .reg-table tbody tr.selected {
      background: #1a2240;
    }

    .reg-table td {
      padding: 0.45rem 0.75rem;
      vertical-align: top;
    }

    .reg-table td.col-address {
      color: #8aa0ff;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    /* Name column — fixed width ~200px */
    .reg-table td.col-name {
      width: 200px;
      min-width: 200px;
      max-width: 200px;
    }

    /* Name cell display text */
    .name-text {
      display: block;
      width: 100%;
      color: #c8d8ff;
      min-height: 1.2em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: text;
    }

    .name-text.empty {
      color: #3a3f5a;
    }

    /* Inline name input */
    .name-input {
      width: 100%;
      background: #1a1a3a;
      border: 1px solid #4a9eff;
      border-radius: 3px;
      color: #e0e0e0;
      padding: 0.1rem 0.3rem;
      font-size: 0.875rem;
      outline: none;
      box-sizing: border-box;
    }

    .reg-table td.col-type,
    .reg-table td.col-wordorder {
      white-space: nowrap;
    }

    /* Per-row type / word-order dropdowns */
    .row-select {
      background: #1a1a3a;
      border: 1px solid #3a3f5a;
      border-radius: 3px;
      color: #a0b0d0;
      padding: 0.1rem 0.25rem;
      font-size: 0.78rem;
      cursor: pointer;
      outline: none;
    }

    .row-select:focus {
      border-color: #4a9eff;
    }

    .row-select:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .reg-table td.col-parsed {
      color: #7ecfb0;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .reg-table td.col-decimal {
      color: #e0e0e0;
    }

    .reg-table td.col-hex,
    .reg-table td.col-binary {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.82rem;
      color: #a0c4ff;
      white-space: nowrap;
    }

    /* ---- Bit inspector (expanded row) ---- */
    .bit-inspector-row td {
      padding: 0;
      background: #0a0d1a;
      cursor: default;
    }

    .bit-inspector {
      padding: 0.75rem 1rem;
      border-top: 1px solid #1e2440;
    }

    .bit-inspector__title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8aa0ff;
      margin-bottom: 0.6rem;
      letter-spacing: 0.04em;
    }

    .bit-inspector__grid {
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 3px;
      max-width: 600px;
    }

    .bit-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .bit-cell__pos {
      font-size: 0.65rem;
      color: #666;
      font-family: 'Courier New', Courier, monospace;
    }

    .bit-cell__val {
      width: 26px;
      height: 26px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8rem;
      font-weight: 700;
      transition: background 0.1s, color 0.1s;
    }

    .bit-cell__val--on {
      background: #1e4a8a;
      color: #a0c4ff;
      border: 1px solid #4a9eff;
    }

    .bit-cell__val--off {
      background: #1a1a2e;
      color: #444;
      border: 1px solid #2a2f45;
    }

    /* ---- Status / empty states ---- */
    .viewer-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 120px;
      color: #555;
      font-size: 0.875rem;
    }

    .viewer-error {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80px;
      color: #e05050;
      font-size: 0.875rem;
      padding: 0 1rem;
      text-align: center;
    }

    .viewer-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80px;
      color: #666;
      font-size: 0.875rem;
    }

    /* ---- Auto-refresh indicator dot ---- */
    .refresh-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #555;
      display: inline-block;
      margin-left: 0.25rem;
      vertical-align: middle;
    }

    .refresh-dot.active {
      background: #4a9eff;
      box-shadow: 0 0 4px #4a9eff88;
    }
  </style>
</head>
<body class="viewer-page">

  <header class="global-header">
    <span class="global-header__title">
      <img src="/favicon/favicon.svg" alt="Aegis" class="header-logo">AEGIS CONTROL
    </span>
    <div class="global-header__actions">
      <a href="/" class="btn-action">← Devices</a>
      <a href="/help" class="btn-action">Help</a>
    </div>
  </header>

  <div class="viewer-layout">

    <!-- Query controls -->
    <div class="viewer-controls">

      <div class="viewer-controls__group">
        <span class="viewer-controls__label">Device</span>
        <select id="v-device" class="viewer-controls__input viewer-controls__input--medium">
          <option value="">— select —</option>
        </select>
      </div>

      <div class="viewer-controls__sep"></div>

      <div id="v-endpoint-info" class="viewer-endpoint" style="display:none">
        <span id="v-endpoint-text"></span>
      </div>

      <div class="viewer-controls__group">
        <span class="viewer-controls__label">Function Code</span>
        <select id="v-fc" class="viewer-controls__input viewer-controls__input--fc">
          <option value="3">FC3 — Holding Registers</option>
          <option value="4">FC4 — Input Registers</option>
          <option value="1">FC1 — Coils</option>
          <option value="2">FC2 — Discrete Inputs</option>
        </select>
      </div>

      <div class="viewer-controls__group">
        <span class="viewer-controls__label">Start Address</span>
        <input id="v-address" type="number" min="0" max="65535" value="0"
               class="viewer-controls__input viewer-controls__input--short" placeholder="0">
      </div>

      <div class="viewer-controls__group">
        <span class="viewer-controls__label">Quantity</span>
        <input id="v-quantity" type="number" min="1" max="125" value="10"
               class="viewer-controls__input viewer-controls__input--short" placeholder="10">
      </div>

      <div class="viewer-controls__actions">
        <button id="v-read-btn" class="btn-primary">Read</button>
        <label class="viewer-controls__refresh" title="Refresh every second">
          <input id="v-auto-refresh" type="checkbox">
          Auto-refresh <span id="v-refresh-dot" class="refresh-dot"></span>
        </label>
      </div>

    </div>

    <!-- Register table -->
    <div class="viewer-card">
      <div class="viewer-card__header">
        <span class="viewer-card__title">Register Values</span>
        <span id="v-card-meta" class="viewer-card__meta"></span>
      </div>
      <div class="viewer-card__body" id="v-table-body">
        <div class="viewer-empty">Select a device and press Read to load register values.</div>
      </div>
    </div>

  </div>

  <div id="toast" class="toast hidden"></div>

  <script>
  (function () {
    'use strict';

    // ---- State ----
    let devices = [];        // [{key, displayName, source, target}]
    let lastValues = [];     // last read register values [{address, value}]
    let expandedRow = null;  // address of currently expanded bit inspector row
    let refreshTimer = null;
    let dataviewConfig = {}; // {device: {fc_key: {addr_key: {name,type,word_order}}}}

    const AUTO_REFRESH_INTERVAL_MS = 1000;
    const MAX_NAME_LENGTH = 80; // Maximum characters for a register label.

    // Supported data types for register interpretation.
    const DATA_TYPES = [
      { value: '',             label: '\u2014'      },
      { value: 'uint16',       label: 'UINT16'      },
      { value: 'int16',        label: 'INT16'       },
      { value: 'uint32',       label: 'UINT32'      },
      { value: 'int32',        label: 'INT32'       },
      { value: 'float32',      label: 'FLOAT32'     },
      { value: 'uint64',       label: 'UINT64'      },
      { value: 'int64',        label: 'INT64'       },
      { value: 'float64',      label: 'FLOAT64'     },
      { value: 'timestamp32',  label: 'TIMESTAMP32' },
      { value: 'timestamp64',  label: 'TIMESTAMP64' },
    ];

    // Word order options per width category.
    const WORD_ORDERS_32 = [
      { value: 'AB', label: 'AB' },
      { value: 'BA', label: 'BA' },
    ];
    const WORD_ORDERS_64 = [
      { value: 'ABCD', label: 'ABCD' },
      { value: 'BADC', label: 'BADC' },
      { value: 'CDAB', label: 'CDAB' },
      { value: 'DCBA', label: 'DCBA' },
    ];

    // ---- DOM refs ----
    const selDevice   = document.getElementById('v-device');
    const selFC       = document.getElementById('v-fc');
    const inpAddress  = document.getElementById('v-address');
    const inpQuantity = document.getElementById('v-quantity');
    const btnRead     = document.getElementById('v-read-btn');
    const chkRefresh  = document.getElementById('v-auto-refresh');
    const dotRefresh  = document.getElementById('v-refresh-dot');
    const tableBody   = document.getElementById('v-table-body');
    const cardMeta    = document.getElementById('v-card-meta');
    const epInfo      = document.getElementById('v-endpoint-info');
    const epText      = document.getElementById('v-endpoint-text');

    // ---- Init ----
    loadDevices();
    loadDataview();

    // ---- Event listeners ----
    selDevice.addEventListener('change', onDeviceChange);
    btnRead.addEventListener('click', doRead);
    chkRefresh.addEventListener('change', onAutoRefreshChange);

    // ---- Load device list ----
    function loadDevices() {
      fetch('/api/config/view')
        .then(r => r.json())
        .then(data => {
          devices = data.devices || [];
          selDevice.innerHTML = '<option value="">\u2014 select \u2014</option>';
          devices.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.key;
            opt.textContent = d.display_name || d.key;
            selDevice.appendChild(opt);
          });
          // Auto-select first device if available.
          if (devices.length > 0) {
            selDevice.value = devices[0].key;
            onDeviceChange();
          }
        })
        .catch(err => {
          console.error('viewer: failed to load device list:', err);
        });
    }

    // ---- Load dataview configuration ----
    function loadDataview() {
      fetch('/api/dataview')
        .then(r => r.json())
        .then(data => {
          dataviewConfig = data.registers || {};
          // Re-render if values are already loaded so labels appear immediately.
          if (lastValues.length > 0) {
            renderTable(parseInt(selFC.value, 10));
          }
        })
        .catch(err => {
          console.error('viewer: failed to load dataview config:', err);
        });
    }

    // ---- Look up a register's dataview entry ----
    function getEntry(device, fc, address) {
      const fcKey   = 'fc' + fc;
      const addrKey = String(address);
      return (dataviewConfig[device] &&
              dataviewConfig[device][fcKey] &&
              dataviewConfig[device][fcKey][addrKey]) || {};
    }

    // ---- Save a register entry to the backend ----
    function saveEntry(device, fc, address, name, type, wordOrder) {
      fetch('/api/dataview/register', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          device:     device,
          fc:         fc,
          address:    address,
          name:       name,
          type:       type,
          word_order: wordOrder,
        }),
      })
      .then(r => r.json())
      .then(() => {
        // Update local cache.
        const fcKey   = 'fc' + fc;
        const addrKey = String(address);
        if (!dataviewConfig[device])        dataviewConfig[device]        = {};
        if (!dataviewConfig[device][fcKey]) dataviewConfig[device][fcKey] = {};
        if (name === '' && type === '' && wordOrder === '') {
          delete dataviewConfig[device][fcKey][addrKey];
        } else {
          dataviewConfig[device][fcKey][addrKey] = { name, type, word_order: wordOrder };
        }
        renderTable(fc);
      })
      .catch(err => {
        console.error('viewer: save entry failed:', err);
      });
    }

    function onDeviceChange() {
      const key = selDevice.value;
      const dev = devices.find(d => d.key === key);
      if (dev && dev.source) {
        epText.textContent = dev.source.endpoint + '  \u00b7  Unit ID ' + dev.source.unit_id;
        epInfo.style.display = '';
      } else {
        epInfo.style.display = 'none';
      }
      // Clear table when device changes.
      clearTable();
    }

    function onAutoRefreshChange() {
      if (chkRefresh.checked) {
        dotRefresh.classList.add('active');
        doRead();
        refreshTimer = setInterval(doRead, AUTO_REFRESH_INTERVAL_MS);
      } else {
        dotRefresh.classList.remove('active');
        if (refreshTimer !== null) {
          clearInterval(refreshTimer);
          refreshTimer = null;
        }
      }
    }

    // ---- Read registers ----
    function doRead() {
      const device   = selDevice.value;
      const fc       = parseInt(selFC.value, 10);
      const address  = parseInt(inpAddress.value, 10);
      const quantity = parseInt(inpQuantity.value, 10);

      if (!device) {
        showError('Please select a device.');
        return;
      }
      if (isNaN(address) || address < 0 || address > 65535) {
        showError('Address must be 0\u201365535.');
        return;
      }
      if (isNaN(quantity) || quantity < 1 || quantity > 125) {
        showError('Quantity must be 1\u2013125.');
        return;
      }

      const url = '/api/viewer/read?device=' + encodeURIComponent(device)
                + '&fc=' + fc
                + '&address=' + address
                + '&quantity=' + quantity;

      // Show loading only on first load (not during auto-refresh)
      if (lastValues.length === 0) {
        tableBody.innerHTML = '<div class="viewer-loading">Reading\u2026</div>';
      }

      fetch(url)
        .then(r => {
          if (!r.ok) {
            return r.json().then(e => { throw new Error('HTTP ' + r.status + ': ' + (e.error || 'request failed')); });
          }
          return r.json();
        })
        .then(data => {
          const values = data.values || [];
          const startAddr = data.address;
          lastValues = values.map((v, i) => ({ address: startAddr + i, value: v }));
          renderTable(fc);
          cardMeta.textContent = values.length + ' register' + (values.length !== 1 ? 's' : '')
                               + ' \u00b7 FC' + fc + ' \u00b7 ' + new Date().toLocaleTimeString();
        })
        .catch(err => {
          if (!chkRefresh.checked) {
            showError(err.message);
          }
        });
    }

    // ---- Type category helpers ----
    function typeIs32(type) {
      return type === 'uint32' || type === 'int32' || type === 'float32' || type === 'timestamp32';
    }
    function typeIs64(type) {
      return type === 'uint64' || type === 'int64' || type === 'float64' || type === 'timestamp64';
    }
    function typeRegCount(type) {
      if (typeIs32(type)) return 2;
      if (typeIs64(type)) return 4;
      return 1;
    }

    // ---- Format a Date as YYYY-MM-DD HH:mm:ss (UTC) ----
    function formatDateTime(d) {
      if (isNaN(d.getTime())) return 'Invalid Date';
      const pad = n => String(n).padStart(2, '0');
      return d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate())
           + ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds());
    }

    // ---- Build word-order <option> tags for the given type / current value ----
    function buildWordOrderOptions(type, wo) {
      if (typeIs64(type)) {
        const valid = ['ABCD', 'BADC', 'CDAB', 'DCBA'];
        const sel   = valid.includes(wo) ? wo : 'ABCD';
        return WORD_ORDERS_64.map(w =>
          '<option value="' + w.value + '"' + (w.value === sel ? ' selected' : '') + '>' + w.label + '</option>'
        ).join('');
      }
      if (typeIs32(type)) {
        const valid = ['AB', 'BA'];
        const sel   = valid.includes(wo) ? wo : 'AB';
        return WORD_ORDERS_32.map(w =>
          '<option value="' + w.value + '"' + (w.value === sel ? ' selected' : '') + '>' + w.label + '</option>'
        ).join('');
      }
      // 16-bit or none — disabled, single placeholder.
      return '<option value="">\u2014</option>';
    }

    // ---- Build a DataView over 4 registers applying 64-bit word order ----
    function make64BitDataView(v0, v1, v2, v3, wo) {
      const order = (['ABCD', 'BADC', 'CDAB', 'DCBA'].includes(wo)) ? wo : 'ABCD';
      let regs;
      if (order === 'ABCD') regs = [v0, v1, v2, v3];
      else if (order === 'BADC') regs = [v1, v0, v3, v2];
      else if (order === 'CDAB') regs = [v2, v3, v0, v1];
      else                       regs = [v3, v2, v1, v0]; // DCBA
      const buf = new ArrayBuffer(8);
      const dv  = new DataView(buf);
      dv.setUint16(0, regs[0]);
      dv.setUint16(2, regs[1]);
      dv.setUint16(4, regs[2]);
      dv.setUint16(6, regs[3]);
      return dv;
    }

    // ---- Check that `count` registers starting at `address` are present and consecutive ----
    function hasConsecutiveRegisters(idx, address, count) {
      if (idx + count - 1 >= lastValues.length) return false;
      for (let i = 1; i < count; i++) {
        if (lastValues[idx + i].address !== address + i) return false;
      }
      return true;
    }

    // ---- Format a 32-bit value (as two 16-bit halves) to grouped binary ----
    function reg32bin(hi, lo) {
      const b = (hi * 0x10000 + lo).toString(2).padStart(32, '0');
      return b.slice(0, 8) + '&nbsp;' + b.slice(8, 16) + '&nbsp;' + b.slice(16, 24) + '&nbsp;' + b.slice(24);
    }

    // ---- Return hex string for combined multi-register value (or null) ----
    function getCombinedHex(address, type, wo) {
      const idx = lastValues.findIndex(r => r.address === address);
      if (idx < 0) return null;
      const v0 = lastValues[idx].value;

      if (typeIs32(type)) {
        if (!hasConsecutiveRegisters(idx, address, 2)) return null;
        const v1 = lastValues[idx + 1].value;
        const combined = ((wo === 'BA') ? ((v1 << 16) | v0) : ((v0 << 16) | v1)) >>> 0;
        return '0x' + combined.toString(16).toUpperCase().padStart(8, '0');
      }
      if (typeIs64(type)) {
        if (!hasConsecutiveRegisters(idx, address, 4)) return null;
        const v1 = lastValues[idx + 1].value, v2 = lastValues[idx + 2].value, v3 = lastValues[idx + 3].value;
        const dv = make64BitDataView(v0, v1, v2, v3, wo || 'ABCD');
        let hex = '0x';
        for (let i = 0; i < 8; i++) hex += dv.getUint8(i).toString(16).toUpperCase().padStart(2, '0');
        return hex;
      }
      return null;
    }

    // ---- Return binary string for combined multi-register value (or null) ----
    function getCombinedBinary(address, type, wo) {
      const idx = lastValues.findIndex(r => r.address === address);
      if (idx < 0) return null;
      const v0 = lastValues[idx].value;

      if (typeIs32(type)) {
        if (!hasConsecutiveRegisters(idx, address, 2)) return null;
        const v1 = lastValues[idx + 1].value;
        const combined = ((wo === 'BA') ? ((v1 << 16) | v0) : ((v0 << 16) | v1)) >>> 0;
        const b = combined.toString(2).padStart(32, '0');
        return b.slice(0, 8) + '&nbsp;' + b.slice(8, 16) + '&nbsp;' + b.slice(16, 24) + '&nbsp;' + b.slice(24);
      }
      if (typeIs64(type)) {
        if (!hasConsecutiveRegisters(idx, address, 4)) return null;
        const v1 = lastValues[idx + 1].value, v2 = lastValues[idx + 2].value, v3 = lastValues[idx + 3].value;
        const dv = make64BitDataView(v0, v1, v2, v3, wo || 'ABCD');
        return reg32bin(dv.getUint16(0), dv.getUint16(2)) + '<br>' + reg32bin(dv.getUint16(4), dv.getUint16(6));
      }
      return null;
    }

    // ---- Compute parsed value from raw register value(s) ----
    // Returns a string, or null when no type is configured.
    function parsedValue(address, type, wordOrder) {
      if (!type) return null;

      const idx = lastValues.findIndex(r => r.address === address);
      if (idx < 0) return null;
      const v0 = lastValues[idx].value;

      if (type === 'uint16') return String(v0);
      if (type === 'int16')  return String(v0 >= 0x8000 ? v0 - 0x10000 : v0);

      // 32-bit types need the next consecutive register.
      if (!hasConsecutiveRegisters(idx, address, 2)) return '\u2014';
      const v1 = lastValues[idx + 1].value;

      if (typeIs64(type)) {
        // 64-bit types need 4 consecutive registers.
        if (!hasConsecutiveRegisters(idx, address, 4)) return '\u2014';
        const v2 = lastValues[idx + 2].value;
        const v3 = lastValues[idx + 3].value;
        const dv = make64BitDataView(v0, v1, v2, v3, wordOrder || 'ABCD');

        if (type === 'float64') {
          const f = dv.getFloat64(0);
          return isFinite(f) ? f.toString() : String(f);
        }
        // Use BigInt for exact 64-bit integer arithmetic.
        const raw64 = BigInt(dv.getUint32(0)) * 0x100000000n + BigInt(dv.getUint32(4));
        if (type === 'uint64') return raw64.toString();
        if (type === 'int64') {
          return (raw64 >= 0x8000000000000000n ? raw64 - 0x10000000000000000n : raw64).toString();
        }
        if (type === 'timestamp64') {
          return formatDateTime(new Date(Number(raw64)));
        }
        return null;
      }

      // 32-bit types.
      const wo       = wordOrder || 'AB';
      const combined = (wo === 'AB')
        ? ((v0 << 16) | v1) >>> 0
        : ((v1 << 16) | v0) >>> 0;

      if (type === 'uint32') return String(combined);
      if (type === 'int32')  return String(combined >= 0x80000000 ? combined - 0x100000000 : combined);
      if (type === 'float32') {
        const buf = new ArrayBuffer(4);
        new DataView(buf).setUint32(0, combined);
        const f = new DataView(buf).getFloat32(0);
        // 7 significant digits matches IEEE 754 single-precision display fidelity.
        return isFinite(f) ? parseFloat(f.toPrecision(7)).toString() : String(f);
      }
      if (type === 'timestamp32') {
        return formatDateTime(new Date(combined * 1000));
      }
      return null;
    }

    // ---- Render table ----
    function renderTable(fc) {
      if (lastValues.length === 0) {
        tableBody.innerHTML = '<div class="viewer-empty">No values returned.</div>';
        return;
      }

      const isBit    = (fc === 1 || fc === 2);
      const device   = selDevice.value;
      const colspanBI = isBit ? 3 : 8;

      let thead = '<thead><tr>'
        + '<th>Address</th>'
        + '<th>Name</th>';
      if (!isBit) {
        thead += '<th>Type</th><th>Word&nbsp;Order</th><th>Parsed</th>';
      }
      thead += '<th>Decimal</th>';
      if (!isBit) thead += '<th>Hex</th><th>Binary</th>';
      thead += '</tr></thead>';

      let rows = '';
      const consumedAddresses = new Set();
      lastValues.forEach(({ address, value }) => {
        if (consumedAddresses.has(address)) return; // skip registers consumed by a multi-reg type

        const isExpanded = (expandedRow === address);
        const rowCls   = isExpanded ? 'selected' : '';
        const entry    = getEntry(device, fc, address);
        const name     = entry.name      || '';
        const type     = entry.type      || '';
        const wo       = entry.word_order || '';

        // Mark subsequent registers as consumed so they are not rendered as separate rows.
        const regCount = typeRegCount(type);
        for (let i = 1; i < regCount; i++) {
          consumedAddresses.add(address + i);
        }

        // Compute display values — use combined for multi-register types.
        const is32 = typeIs32(type);
        const is64 = typeIs64(type);
        let hexStr = getCombinedHex(address, type, wo);
        let binStr = getCombinedBinary(address, type, wo);
        if (!hexStr) hexStr = '0x' + value.toString(16).toUpperCase().padStart(4, '0');
        if (!binStr) binStr = formatBinary(value);

        rows += '<tr class="' + rowCls + '" data-address="' + address + '">';
        rows += '<td class="col-address">' + address + '</td>';

        // Name cell.
        const nameCls = name ? 'name-text' : 'name-text empty';
        rows += '<td class="col-name" data-addr="' + address + '">'
              + '<span class="' + nameCls + '" data-addr="' + address + '">'
              + escHtml(name || '\u2014')
              + '</span></td>';

        if (!isBit) {
          // Type dropdown.
          rows += '<td class="col-type"><select class="row-select type-sel" data-addr="' + address + '">';
          DATA_TYPES.forEach(t => {
            rows += '<option value="' + t.value + '"' + (t.value === type ? ' selected' : '') + '>' + t.label + '</option>';
          });
          rows += '</select></td>';

          // Word Order dropdown (enabled for 32-bit and 64-bit types).
          const woEnabled = is32 || is64;
          rows += '<td class="col-wordorder"><select class="row-select wo-sel" data-addr="' + address + '"'
               + (woEnabled ? '' : ' disabled') + '>';
          rows += buildWordOrderOptions(type, wo);
          rows += '</select></td>';

          // Parsed value.
          const pv = parsedValue(address, type, wo);
          rows += '<td class="col-parsed">'
               + (pv !== null ? escHtml(String(pv)) : '<span style="color:#555">\u2014</span>')
               + '</td>';
        }

        rows += '<td class="col-decimal">' + value + '</td>';
        if (!isBit) {
          rows += '<td class="col-hex">' + hexStr + '</td>'
               + '<td class="col-binary">' + binStr + '</td>';
        }
        rows += '</tr>';

        if (isExpanded && !isBit) {
          rows += '<tr class="bit-inspector-row">'
               + '<td colspan="' + colspanBI + '">' + buildBitInspector(address, value) + '</td>'
               + '</tr>';
        }
      });

      tableBody.innerHTML = '<table class="reg-table">' + thead + '<tbody>' + rows + '</tbody></table>';

      // ---- Bind events after DOM insertion ----

      // Row click for bit inspector (skip Name / Type / Word Order cells).
      tableBody.querySelectorAll('.reg-table tbody tr:not(.bit-inspector-row)').forEach(row => {
        row.addEventListener('click', function (e) {
          if (e.target.closest('.col-name') || e.target.closest('.col-type') || e.target.closest('.col-wordorder')) return;
          if (fc === 1 || fc === 2) return;
          const addr = parseInt(this.getAttribute('data-address'), 10);
          expandedRow = (expandedRow === addr) ? null : addr;
          renderTable(fc);
          if (expandedRow !== null) {
            const sel = tableBody.querySelector('tr.selected');
            if (sel) sel.scrollIntoView({ block: 'nearest' });
          }
        });
      });

      // Name span click -> inline edit.
      tableBody.querySelectorAll('.name-text').forEach(span => {
        attachNameClick(span, device, fc);
      });

      // Type select change.
      tableBody.querySelectorAll('.type-sel').forEach(sel => {
        sel.addEventListener('change', function (e) {
          e.stopPropagation();
          const addr  = parseInt(this.getAttribute('data-addr'), 10);
          const type2 = this.value;
          const en    = getEntry(device, fc, addr);
          // Reset word order when switching between 16/32/64-bit categories.
          let newWo = en.word_order || '';
          if (typeIs64(type2)) {
            if (!['ABCD', 'BADC', 'CDAB', 'DCBA'].includes(newWo)) newWo = 'ABCD';
          } else if (typeIs32(type2)) {
            if (!['AB', 'BA'].includes(newWo)) newWo = 'AB';
          } else {
            newWo = '';
          }
          saveEntry(device, fc, addr, en.name || '', type2, newWo);
        });
      });

      // Word Order select change.
      tableBody.querySelectorAll('.wo-sel').forEach(sel => {
        sel.addEventListener('change', function (e) {
          e.stopPropagation();
          const addr = parseInt(this.getAttribute('data-addr'), 10);
          const wo2  = this.value;
          const en   = getEntry(device, fc, addr);
          saveEntry(device, fc, addr, en.name || '', en.type || '', wo2);
        });
      });
    }

    // ---- Attach inline-edit click listener to a .name-text span ----
    function attachNameClick(span, device, fc) {
      span.addEventListener('click', function (e) {
        e.stopPropagation();
        const addr    = parseInt(this.getAttribute('data-addr'), 10);
        const td      = this.parentElement;
        const curName = getEntry(device, fc, addr).name || '';

        const inp    = document.createElement('input');
        inp.type      = 'text';
        inp.className = 'name-input';
        inp.value     = curName;
        inp.maxLength = MAX_NAME_LENGTH;
        td.replaceChild(inp, this);
        inp.focus();
        inp.select();

        let committed = false;

        function commit() {
          if (committed) return;
          committed = true;
          const newName = inp.value.trim();
          const en2     = getEntry(device, fc, addr);
          const t2      = en2.type      || '';
          const w2      = en2.word_order || '';
          const sp2     = document.createElement('span');
          sp2.className = newName ? 'name-text' : 'name-text empty';
          sp2.setAttribute('data-addr', String(addr));
          sp2.textContent = newName || '\u2014';
          td.replaceChild(sp2, inp);
          attachNameClick(sp2, device, fc);
          saveEntry(device, fc, addr, newName, t2, w2);
        }

        function cancel() {
          if (committed) return;
          committed = true;
          const nm  = getEntry(device, fc, addr).name || '';
          const sp2 = document.createElement('span');
          sp2.className = nm ? 'name-text' : 'name-text empty';
          sp2.setAttribute('data-addr', String(addr));
          sp2.textContent = nm || '\u2014';
          td.replaceChild(sp2, inp);
          attachNameClick(sp2, device, fc);
        }

        inp.addEventListener('keydown', ke => {
          if (ke.key === 'Enter')  { ke.preventDefault(); commit(); }
          if (ke.key === 'Escape') { cancel(); }
        });
        inp.addEventListener('blur', commit);
      });
    }

    // ---- Bit inspector HTML ----
    function buildBitInspector(address, value) {
      let cells = '';
      // Display bits 15 down to 0 (MSB first).
      for (let bit = 15; bit >= 0; bit--) {
        const bitVal = (value >> bit) & 1;
        const cls = bitVal ? 'bit-cell__val--on' : 'bit-cell__val--off';
        cells += '<div class="bit-cell">'
               + '<div class="bit-cell__pos">' + bit + '</div>'
               + '<div class="bit-cell__val ' + cls + '">' + bitVal + '</div>'
               + '</div>';
      }
      return '<div class="bit-inspector">'
           + '<div class="bit-inspector__title">Register ' + address + '</div>'
           + '<div class="bit-inspector__grid">' + cells + '</div>'
           + '</div>';
    }

    // ---- Helpers ----
    function formatBinary(value) {
      const b = value.toString(2).padStart(16, '0');
      return b.slice(0, 8) + ' ' + b.slice(8);
    }

    function clearTable() {
      lastValues = [];
      expandedRow = null;
      tableBody.innerHTML = '<div class="viewer-empty">Select a device and press Read to load register values.</div>';
      cardMeta.textContent = '';
    }

    function showError(msg) {
      tableBody.innerHTML = '<div class="viewer-error">' + escHtml(msg) + '</div>';
    }

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

  })();
  </script>

</body>
</html>
