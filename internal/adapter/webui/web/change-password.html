<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis – Change Password</title>
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-card__title">Change Password</div>
            <p class="change-password-notice">A new password must be set before continuing.</p>
            <div class="login-field">
                <label for="newPassword">New Password</label>
                <input class="field-input" type="password" id="newPassword" name="new_password" autocomplete="new-password" autofocus>
            </div>
            <div class="login-field">
                <label for="confirmPassword">Confirm Password</label>
                <input class="field-input" type="password" id="confirmPassword" name="confirm_password" autocomplete="new-password">
            </div>
            <button class="btn-primary login-btn" id="saveBtn">Save</button>
            <div class="login-error" id="changeError"></div>
        </div>
    </div>
    <script>
        document.getElementById('saveBtn').addEventListener('click', doChangePassword);
        document.getElementById('confirmPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doChangePassword();
        });

        async function doChangePassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errEl = document.getElementById('changeError');
            errEl.style.display = 'none';

            if (!newPassword) {
                errEl.textContent = 'New password is required.';
                errEl.style.display = 'block';
                return;
            }
            if (newPassword !== confirmPassword) {
                errEl.textContent = 'Passwords do not match.';
                errEl.style.display = 'block';
                return;
            }

            try {
                const resp = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({new_password: newPassword, confirm_password: confirmPassword})
                });
                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    const body = await resp.json().catch(() => ({}));
                    errEl.textContent = body.error || 'Password change failed.';
                    errEl.style.display = 'block';
                }
            } catch {
                errEl.textContent = 'Request failed.';
                errEl.style.display = 'block';
            }
        }
    </script>
</body>
</html>
