<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Device Configuration</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>Aegis Device Configuration</h1>
                <div class="runtime-controls">
                    <div class="status-bar" id="statusBar">
                        <span class="status-dot" id="statusDot"></span>
                        <span id="statusText">Checking...</span>
                    </div>
                    <div class="runtime-buttons">
                        <button class="btn btn-success" id="startBtn" disabled>Start</button>
                        <button class="btn btn-warning" id="stopBtn" disabled>Stop</button>
                        <button class="btn btn-secondary" id="restartBtn" disabled>Restart</button>
                    </div>
                </div>
            </div>
            <div id="errorBar" class="error-bar" style="display:none;"></div>
        </header>

        <div class="layout">
            <!-- LEFT PANEL: DEVICES -->
            <div class="left-panel">
                <h2>Devices</h2>
                <div class="device-list" id="deviceList">
                    <!-- Populated by JavaScript -->
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" id="addBtn" disabled title="Editing available in next phase">+ Add</button>
                    <button class="btn btn-danger" id="deleteBtn" disabled title="Editing available in next phase">Delete</button>
                </div>
            </div>

            <!-- RIGHT PANEL: CONFIGURATION DETAILS -->
            <div class="right-panel">
                <!-- SOURCE SECTION -->
                <section class="config-section">
                    <h3>Source</h3>
                    <div class="config-content">
                        <div class="config-row">
                            <div class="config-field">
                                <span class="label">Endpoint:</span>
                                <span class="value" id="sourceEndpoint">-</span>
                            </div>
                            <div class="config-field">
                                <span class="label">Timeout:</span>
                                <span class="value" id="sourceTimeout">-</span>
                            </div>
                        </div>
                        <div class="config-row">
                            <div class="config-field">
                                <span class="label">Unit ID:</span>
                                <span class="value" id="sourceUnitId">-</span>
                            </div>
                            <div class="config-field">
                                <span class="label">Device Name:</span>
                                <span class="value" id="sourceDeviceName">-</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- READS SECTION -->
                <section class="config-section">
                    <h3>Reads</h3>
                    <div class="config-content">
                        <div id="readsList" class="reads-list">
                            <!-- Populated by JavaScript -->
                        </div>
                        <div>
                            <button class="btn btn-primary btn-add-read" id="addReadBtn">+ Add Read</button>
                        </div>
                    </div>
                </section>

                <!-- TARGET SECTION -->
                <section class="config-section">
                    <h3>Target</h3>
                    <div class="config-content">
                        <div class="config-row">
                            <div class="config-field">
                                <span class="label">Port:</span>
                                <span class="value" id="targetPort">-</span>
                            </div>
                            <div class="config-field">
                                <span class="label">Unit ID:</span>
                                <span class="value" id="targetUnitId">-</span>
                            </div>
                            <div class="config-field">
                                <span class="label">Status Unit ID:</span>
                                <span class="value" id="targetStatusUnitId">-</span>
                            </div>
                        </div>
                        <div class="config-row">
                            <div class="config-field">
                                <span class="label">Status Slot:</span>
                                <span class="value" id="targetStatusSlot">-</span>
                            </div>
                            <div class="config-field">
                                <span class="label">Mode:</span>
                                <span class="value" id="targetMode">-</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>

    <!-- Read Add/Edit Modal -->
    <div id="readModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3 id="readModalTitle">Add Read</h3>
            <div id="readModalError" class="modal-error" style="display:none;"></div>
            <div class="modal-fields">
                <label class="modal-label">
                    FC (1–4)
                    <input id="readFc" type="number" min="1" max="4" class="modal-input" placeholder="e.g. 3">
                </label>
                <label class="modal-label">
                    Address
                    <input id="readAddress" type="number" min="0" max="65535" class="modal-input" placeholder="e.g. 0">
                </label>
                <label class="modal-label">
                    Quantity
                    <input id="readQuantity" type="number" min="1" max="65535" class="modal-input" placeholder="e.g. 10">
                </label>
                <label class="modal-label">
                    Interval (ms)
                    <input id="readInterval" type="number" min="1" class="modal-input" placeholder="e.g. 1000">
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="readModalSave">Save</button>
                <button class="btn btn-secondary" id="readModalCancel">Cancel</button>
            </div>
        </div>
    </div>
</body>
</html>
