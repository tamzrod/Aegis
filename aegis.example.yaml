# aegis.example.yaml
#
# Aegis — single-binary Modbus memory backplane with integrated replication engine.
#
# Configuration is loaded once at startup. Invalid config causes immediate exit.
# No hot reload in this version.
#
# Memory layout (data and status) is derived entirely from replicator.units[*].target.
# No explicit server.listeners.memory section is required.

replicator:
  units:
    - id: "plc1"
      # group: "Site A"   # Optional label used to visually group devices in the WebUI.
      #                   # Devices that share a group name are shown under a collapsible
      #                   # folder in the device list.  Omit or leave empty for no grouping.
      source:
        endpoint: "192.168.1.100:502"
        unit_id: 1
        timeout_ms: 1000

        # Optional device name included in the status block (up to 16 ASCII characters)
        device_name: "PLC1"

      reads:
        - fc: 3               # Read Holding Registers
          address: 0
          quantity: 10
          interval_ms: 200    # fast-moving data: 200 ms
        - fc: 4               # Read Input Registers
          address: 0
          quantity: 5
          interval_ms: 5000   # slow-moving data: 5 s

      target:
        port: 502             # Modbus TCP listener port (listener is created automatically)
        unit_id: 1            # target memory unit_id in the store

        # status_unit_id: required when status_slot is set.
        # Must differ from all data unit_ids on the same port.
        status_unit_id: 255

        # status_slot: zero-based slot index for this unit's status block.
        # Each slot occupies 30 consecutive holding registers starting at slot*30.
        # Must be unique per (port, status_unit_id).
        status_slot: 0

        # mode: authority mode for this target (default = "B")
        # A = standalone (allows writes, always serves reads)
        # B = strict     (rejects writes, blocks reads on unhealthy)
        # C = buffered   (rejects writes, always serves reads)
        mode: "B"

        # Optional per-FC address offsets (delta applied to destination address)
        # offsets:
        #   3: 0   # FC3 holding registers: no offset
        #   4: 0   # FC4 input registers: no offset

# Optional debug flags (all default to false; omit section for normal operation).
# debug:
#   adapter_routing: false   # Set to true to enable verbose per-request routing logs.

# WebUI authentication credentials (form-based login — always enforced).
# Default when this section is absent: username=admin, password=admin.
# password_hash must be a bcrypt hash (e.g. generated with: htpasswd -nbB admin mypassword).
# auth:
#   username: admin
#   password_hash: "$2a$10$..."
